name: CI - Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-fraud-detector:
    name: Fraud Detector - Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: fraud-detector
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        working-directory: fraud-detector
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  test-api-gateway:
    name: API Gateway - Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: api-gateway
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: api-gateway
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests found. Skipping."
          fi

  lint:
    name: Lint - Ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint api-gateway
        run: ruff check api-gateway/

      - name: Lint fraud-detector
        run: ruff check fraud-detector/